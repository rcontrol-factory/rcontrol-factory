<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />

  <title>RControl Factory</title>
  <meta name="theme-color" content="#d9dde6" />
  <meta name="color-scheme" content="light dark" />
  <meta name="rcf-index" content="FACTORY_VISUAL_LAYER_2026_03_13" />

  <base href="./" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./assets/icons/app/app-icon.png" />
  <link rel="apple-touch-icon" href="./assets/icons/app/app-icon.png" />

  <link rel="preload" as="image" href="./assets/icons/app/app-icon.png" />
  <link rel="preload" as="image" href="./assets/backgrounds/login-boot-background.jpeg" />
  <link rel="preload" as="image" href="./assets/backgrounds/internal-background.jpeg" />
  <link rel="preload" as="image" href="./assets/branding/header-logo.jpeg" />

  <link rel="stylesheet" href="./css/factory-theme.css" />
  <link rel="stylesheet" href="./css/factory-shell.css" />
  <link rel="stylesheet" href="./css/factory-components.css" />
  <link rel="stylesheet" href="./css/factory-mobile.css" />

  <style>
    html, body {
      min-height: 100%;
      margin: 0;
      background: #d9dde6;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2a44;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    #app {
      min-height: 100vh;
      position: relative;
      isolation: isolate;
    }

    .rcf-index-splash {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(20px, env(safe-area-inset-top))
        20px
        max(20px, env(safe-area-inset-bottom))
        20px;
      box-sizing: border-box;
      background:
        linear-gradient(rgba(7, 13, 24, .54), rgba(7, 13, 24, .36)),
        url("./assets/backgrounds/login-boot-background.jpeg") center center / cover no-repeat;
    }

    .rcf-index-card {
      width: min(100%, 680px);
      border-radius: 28px;
      padding: 24px 22px;
      box-sizing: border-box;
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(10,18,32,.68), rgba(15,24,42,.54));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        0 24px 60px rgba(0,0,0,.28),
        inset 0 1px 0 rgba(255,255,255,.10);
      color: #eef3ff;
    }

    .rcf-index-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .rcf-index-brand-mark {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      object-fit: cover;
      flex: 0 0 58px;
      box-shadow: 0 10px 24px rgba(0,0,0,.24);
      background: rgba(255,255,255,.08);
    }

    .rcf-index-brand-logo {
      display: block;
      width: min(100%, 320px);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,.18));
    }

    .rcf-index-title {
      margin: 18px 0 8px;
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.02;
      letter-spacing: -.02em;
      font-weight: 900;
    }

    .rcf-index-text {
      margin: 0;
      color: rgba(236, 242, 255, .82);
      font-size: 14px;
      line-height: 1.5;
    }

    .rcf-index-chips {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .rcf-index-chip {
      border-radius: 18px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      min-height: 62px;
      box-sizing: border-box;
    }

    .rcf-index-chip strong {
      display: block;
      font-size: 13px;
      line-height: 1.15;
      color: #ffffff;
    }

    .rcf-index-chip span {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      color: rgba(236, 242, 255, .72);
    }

    @media (max-width: 720px) {
      .rcf-index-card {
        padding: 20px 18px;
        border-radius: 24px;
      }

      .rcf-index-brand-logo {
        width: min(100%, 250px);
      }

      .rcf-index-chips {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <script defer src="./js/core/logger.js"></script>
  <script defer src="./js/core/stability_guard.js"></script>
  <script defer src="./js/core/factory_state.js"></script>
  <script defer src="./js/core/module_registry.js"></script>
  <script defer src="./js/core/context_engine.js"></script>
  <script defer src="./js/core/factory_tree.js"></script>

  <script defer src="./js/core/storage.js"></script>
  <script defer src="./js/core/github_sync.js"></script>
  <script defer src="./js/core/vfs_overrides.js"></script>
  <script defer src="./js/core/vfs_shim.js"></script>
  <script defer src="./js/core/mother_selfupdate.js"></script>

  <script defer src="./js/core/errors.js"></script>
  <script defer src="./js/core/ui_safety.js"></script>
  <script defer src="./js/core/ui_compact_outputs.js"></script>
  <script defer src="./js/core/ui_runtime.js"></script>
  <script defer src="./js/core/ui_shell.js"></script>
  <script defer src="./js/core/ui_bindings.js"></script>
  <script defer src="./js/core/diagnostics.js"></script>
  <script defer src="./js/core/doctor_scan.js"></script>
  <script defer src="./js/core/preview_runner.js"></script>

  <script defer src="./js/core/injector.js"></script>
  <script defer src="./js/engine/template_registry.js"></script>
  <script defer src="./js/engine/module_registry.js"></script>
  <script defer src="./js/engine/builder.js"></script>
  <script defer src="./js/engine/engine.js"></script>

  <script defer src="./js/core/pages_links.js"></script>
  <script defer src="./js/admin/admin.github.js"></script>

  <!-- Factory AI chain -->
  <script defer src="./js/core/factory_ai_planner.js"></script>
  <script defer src="./js/core/factory_ai_bridge.js"></script>
  <script defer src="./js/core/patch_supervisor.js"></script>
  <script defer src="./js/core/factory_ai_actions.js"></script>
  <script defer src="./js/core/factory_ai_runtime.js"></script>

  <!-- FIX CRÍTICO: caminho correto do arquivo -->
  <script defer src="./js/admin.admin_ai.js"></script>

  <script defer src="./app.js"></script>

  <script defer src="./js/core/zip_vault.js"></script>
  <script defer src="./js/core/agent_zip_bridge.js"></script>
</head>
<body>
  <noscript>Ative o JavaScript para usar a RControl Factory.</noscript>

  <div id="app">
    <div class="rcf-index-splash" aria-label="Inicializando RControl Factory">
      <div class="rcf-index-card">
        <div class="rcf-index-brand">
          <img
            src="./assets/icons/app/app-icon.png"
            alt="RCF"
            class="rcf-index-brand-mark"
          />
          <img
            src="./assets/branding/header-logo.jpeg"
            alt="Factory by RCONTROL"
            class="rcf-index-brand-logo"
          />
        </div>

        <h1 class="rcf-index-title">Inicializando a Factory</h1>
        <p class="rcf-index-text">
          Carregando a interface oficial da RControl Factory com o visual aprovado,
          módulos internos e boot seguro para Safari, iPhone e PWA.
        </p>

        <div class="rcf-index-chips" aria-hidden="true">
          <div class="rcf-index-chip">
            <strong>Boot / Login</strong>
            <span>Artwork oficial escura</span>
          </div>
          <div class="rcf-index-chip">
            <strong>Factory UI</strong>
            <span>Background interno oficial</span>
          </div>
          <div class="rcf-index-chip">
            <strong>Módulos</strong>
            <span>Assets aprovados da Factory</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

<!-- FILE: /app/index.html -->
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,viewport-fit=cover"
  />
  <meta name="theme-color" content="#071226" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>RControl Factory</title>

  <style>
    :root{
      --rcf-css-token: "V8_INDEX_SHELL_OK";
      --bg: #071226;
      --bg-2: #0c1830;
      --card: rgba(255,255,255,.04);
      --card-2: rgba(255,255,255,.06);
      --line: rgba(255,255,255,.10);
      --line-2: rgba(255,255,255,.14);
      --text: #eef4ff;
      --muted: #aebbd4;
      --accent: #61a8ff;
      --accent-2: #8bc2ff;
      --ok: #2dd4bf;
      --danger: #ef4444;
      --shadow: 0 14px 40px rgba(0,0,0,.28);
      --radius: 18px;
      --radius-sm: 14px;
      --topbar-h: 110px;
      --fab-safe-bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      background:linear-gradient(180deg,#04102a 0%, #071226 45%, #071226 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    body{
      overflow-x:hidden;
    }

    #app{
      min-height:100vh;
    }

    #rcfRoot{
      min-height:100vh;
      padding-bottom:calc(100px + env(safe-area-inset-bottom, 0px));
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:40;
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      background:rgba(5,12,28,.82);
      border-bottom:1px solid rgba(255,255,255,.06);
      padding:
        calc(14px + env(safe-area-inset-top, 0px))
        14px
        12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .dot{
      width:14px;
      height:14px;
      border-radius:999px;
      background:radial-gradient(circle at 30% 30%, #fff 0%, var(--accent-2) 35%, var(--accent) 70%, #264d8e 100%);
      box-shadow:0 0 0 4px rgba(97,168,255,.10);
      flex:0 0 auto;
    }

    .brand-text{
      min-width:0;
    }

    .title{
      font-weight:800;
      letter-spacing:.2px;
      line-height:1.1;
      font-size:20px;
    }

    .subtitle{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:70vw;
    }

    .spacer{
      flex:1 1 auto;
      min-width:0;
    }

    .tabs{
      display:flex;
      gap:8px;
      overflow-x:auto;
      overflow-y:hidden;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      margin-top:12px;
      padding-bottom:2px;
    }

    .tabs::-webkit-scrollbar{
      display:none;
    }

    .tab{
      appearance:none;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:var(--text);
      border-radius:999px;
      padding:10px 14px;
      font-weight:700;
      font-size:14px;
      white-space:nowrap;
      min-height:42px;
      cursor:pointer;
    }

    .tab.active{
      background:rgba(97,168,255,.18);
      border-color:rgba(97,168,255,.42);
      color:#dcebff;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .container{
      width:min(100%, 1080px);
      margin:0 auto;
      padding:14px;
    }

    .views{
      display:block;
    }

    .view{
      display:none;
    }

    .view.active{
      display:block;
      animation:rcfFade .18s ease-out;
    }

    @keyframes rcfFade{
      from{ opacity:.0; transform:translateY(4px); }
      to{ opacity:1; transform:translateY(0); }
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:14px;
    }

    .hero{
      padding-top:18px;
    }

    h1,h2{
      margin:0 0 10px;
      line-height:1.15;
    }

    h1{
      font-size:22px;
      font-weight:800;
    }

    h2{
      font-size:17px;
      font-weight:800;
    }

    p{
      margin:0 0 12px;
      color:var(--text);
    }

    .hint{
      color:var(--muted);
      font-size:13px;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .cmd input,
    .form input,
    input,
    select,
    textarea{
      width:100%;
      min-width:0;
      appearance:none;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:12px 14px;
      outline:none;
      box-shadow:none;
      font:inherit;
    }

    input::placeholder,
    textarea::placeholder{
      color:#c8d2e5;
      opacity:.6;
    }

    input:focus,
    select:focus,
    textarea:focus{
      border-color:rgba(97,168,255,.45);
      box-shadow:0 0 0 3px rgba(97,168,255,.10);
    }

    textarea{
      min-height:180px;
      resize:vertical;
    }

    .textarea{
      width:100%;
    }

    .btn{
      appearance:none;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:11px 14px;
      font-weight:800;
      cursor:pointer;
      min-height:42px;
      box-shadow:none;
    }

    .btn:hover{
      filter:brightness(1.05);
    }

    .btn:active{
      transform:translateY(1px);
    }

    .btn.ok{
      background:rgba(97,168,255,.18);
      border-color:rgba(97,168,255,.42);
      color:#dcebff;
    }

    .btn.ghost{
      background:rgba(255,255,255,.04);
    }

    .btn.danger{
      background:rgba(239,68,68,.16);
      border-color:rgba(239,68,68,.35);
      color:#ffdada;
    }

    .btn.small{
      min-height:38px;
      padding:8px 12px;
      font-size:13px;
    }

    .status-box{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin:12px 0 6px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:38px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      font-weight:700;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:36px;
      padding:7px 11px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.06);
      color:var(--text);
      font-size:13px;
      white-space:nowrap;
    }

    .ok{
      color:#dffcf6;
    }

    .apps,
    .files{
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
    }

    .app-item,
    .file-item{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      border-radius:16px;
      padding:12px;
    }

    .file-item{
      cursor:pointer;
      user-select:none;
      -webkit-user-select:none;
    }

    .file-item.active{
      border-color:rgba(97,168,255,.40);
      background:rgba(97,168,255,.12);
    }

    .editor{
      border:1px solid rgba(255,255,255,.10);
      border-radius:16px;
      overflow:hidden;
      background:rgba(255,255,255,.04);
      min-width:0;
    }

    .editor-head{
      padding:10px 12px;
      font-size:13px;
      color:var(--muted);
      border-bottom:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
    }

    #fileContent{
      border:0;
      border-radius:0;
      min-height:320px;
      background:transparent;
      box-shadow:none;
    }

    .mono{
      margin:0;
      white-space:pre-wrap;
      word-break:break-word;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      font-size:12px;
      line-height:1.45;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.18);
      padding:12px;
      color:#dfe8f8;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      min-height:56px;
    }

    .mono.small{
      font-size:11.5px;
    }

    .tools{
      position:fixed;
      inset:auto 0 0 0;
      z-index:70;
      transform:translateY(106%);
      transition:transform .22s ease;
      padding:0 10px calc(10px + env(safe-area-inset-bottom, 0px));
      pointer-events:none;
    }

    .tools.open{
      transform:translateY(0);
      pointer-events:auto;
    }

    .tools .tools-head,
    .tools .tools-body{
      width:min(100%, 980px);
      margin:0 auto;
      background:rgba(7,13,24,.98);
      border-left:1px solid rgba(255,255,255,.10);
      border-right:1px solid rgba(255,255,255,.10);
    }

    .tools .tools-head{
      border-top:1px solid rgba(255,255,255,.10);
      border-top-left-radius:18px;
      border-top-right-radius:18px;
      padding:12px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .tools .tools-body{
      border-bottom:1px solid rgba(255,255,255,.10);
      border-bottom-left-radius:18px;
      border-bottom-right-radius:18px;
      padding:12px;
      box-shadow:var(--shadow);
    }

    #rcfFab{
      position:fixed;
      right:14px;
      bottom:var(--fab-safe-bottom);
      z-index:90;
    }

    #rcfFabPanel{
      position:fixed;
      right:14px;
      bottom:calc(var(--fab-safe-bottom) + 66px);
      z-index:91;
    }

    .fab-title{
      font-weight:800;
    }

    [hidden]{
      display:none !important;
    }

    @media (max-width: 760px){
      .container{
        padding:12px;
      }

      .row > *{
        flex:1 1 auto;
      }

      .row > .spacer{
        flex:1 1 100%;
      }

      .subtitle{
        max-width:58vw;
      }

      #fileContent{
        min-height:240px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- ENGINE -->
  <script src="./js/engine/module_registry.js"></script>
  <script src="./js/engine/template_registry.js"></script>
  <script src="./js/engine/patchQueue.js"></script>
  <script src="./js/engine/organizerEngine.js"></script>
  <script src="./js/engine/builder.js"></script>
  <script src="./js/engine/builderEngine.js"></script>
  <script src="./js/engine/applyPipeline.js"></script>
  <script src="./js/engine/engine.js"></script>

  <!-- APP -->
  <script src="./app.js"></script>
</body>
</html>

<!-- FILE: /app/index.html -->
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#071226" />

<title>RControl Factory</title>

<style>

:root{
--rcf-css-token:"RCF_INDEX_STABLE_V1";
--bg:#071226;
--card:rgba(255,255,255,.05);
--line:rgba(255,255,255,.1);
--text:#eef4ff;
--muted:#aebbd4;
--accent:#61a8ff;
--radius:16px;
}

*{box-sizing:border-box}

html,body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;
}

#app{
min-height:100vh;
}

.topbar{
padding:14px;
border-bottom:1px solid var(--line);
}

.title{
font-weight:700;
font-size:20px;
}

.subtitle{
font-size:12px;
color:var(--muted);
}

.tabs{
display:flex;
gap:8px;
padding:12px 14px;
overflow-x:auto;
}

.tab{
border:1px solid var(--line);
background:var(--card);
color:var(--text);
border-radius:999px;
padding:8px 14px;
cursor:pointer;
}

.tab.active{
background:rgba(97,168,255,.2);
border-color:rgba(97,168,255,.5);
}

.container{
padding:14px;
}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:var(--radius);
padding:14px;
margin-bottom:14px;
}

.view{
display:none;
}

.view.active{
display:block;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

.btn{
border-radius:999px;
border:1px solid var(--line);
background:var(--card);
color:var(--text);
padding:8px 14px;
cursor:pointer;
}

.btn.ok{
background:rgba(97,168,255,.2);
}

textarea,input{
width:100%;
border-radius:12px;
border:1px solid var(--line);
background:rgba(255,255,255,.06);
color:var(--text);
padding:10px;
}

textarea{
min-height:180px;
}

.apps,.files{
display:flex;
flex-direction:column;
gap:10px;
}

.app-item,.file-item{
border:1px solid var(--line);
border-radius:12px;
padding:10px;
background:rgba(255,255,255,.04);
}

.file-item.active{
background:rgba(97,168,255,.15);
border-color:rgba(97,168,255,.4);
}

.mono{
font-family:monospace;
font-size:12px;
background:rgba(0,0,0,.2);
padding:10px;
border-radius:10px;
border:1px solid var(--line);
white-space:pre-wrap;
}

</style>
</head>

<body>

<div id="app"></div>

<!-- CORE -->
<script src="./js/core/logger.js"></script>
<script src="./js/core/stability_guard.js"></script>
<script src="./js/core/factory_state.js"></script>
<script src="./js/core/context_engine.js"></script>
<script src="./js/core/github_sync.js"></script>

<!-- ENGINE -->
<script src="./js/engine/module_registry.js"></script>
<script src="./js/engine/template_registry.js"></script>
<script src="./js/engine/patchQueue.js"></script>
<script src="./js/engine/organizerEngine.js"></script>
<script src="./js/engine/builder.js"></script>
<script src="./js/engine/builderEngine.js"></script>
<script src="./js/engine/applyPipeline.js"></script>
<script src="./js/engine/engine.js"></script>

<!-- ADMIN -->
<script src="./js/admin.admin_ai.js"></script>
<script src="./js/admin.github.js"></script>

<!-- APP ROOT -->
<script src="./app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>RControl Factory</title>

<link rel="manifest" href="./manifest.json">

<style>

body{
  margin:0;
  background:#0b0b0b;
  color:#e5e5e5;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

#rcfRoot{
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

#rcfHeader{
  padding:12px 16px;
  background:#141414;
  border-bottom:1px solid #222;
  font-weight:600;
}

#rcfNav{
  display:flex;
  gap:8px;
  padding:10px;
  border-bottom:1px solid #222;
  background:#101010;
}

#rcfNav button{
  padding:6px 10px;
  border:1px solid #333;
  background:#1b1b1b;
  color:#ddd;
  border-radius:6px;
  cursor:pointer;
}

#rcfMain{
  flex:1;
  padding:16px;
}

.view{
  display:none;
}

.view.active{
  display:block;
}

pre{
  background:#000;
  padding:10px;
  border-radius:6px;
  overflow:auto;
}

</style>

</head>
<body>

<div id="rcfRoot">

<div id="rcfHeader">
RControl Factory
</div>

<div id="rcfNav">

<button onclick="RCF_setView('generator')">Generator</button>
<button onclick="RCF_setView('admin')">Admin</button>
<button onclick="RCF_setView('logs')">Logs</button>
<button onclick="RCF_runDoctor()">Doctor</button>

</div>

<div id="rcfMain">

<div id="view_generator" class="view active">
<h3>Generator</h3>
<div id="rcfGeneratorPanel"></div>
</div>

<div id="view_admin" class="view">
<h3>Admin</h3>

<div id="rcfAdminPanel">

<h4>Integrations</h4>

<div id="rcfAdminIntegrations"></div>

</div>

</div>

<div id="view_logs" class="view">
<h3>Logs</h3>
<pre id="rcfLogs"></pre>
</div>

</div>

</div>

<script>

window.RCF_VERSION="8.0";

function RCF_setView(name){

  const views=document.querySelectorAll(".view");

  views.forEach(v=>v.classList.remove("active"));

  const el=document.querySelector("#view_"+name);

  if(el){
    el.classList.add("active");
  }

}

function RCF_log(txt){

  const logs=document.querySelector("#rcfLogs");

  if(!logs) return;

  const t=new Date().toISOString();

  logs.textContent+=`[${t}] ${txt}\n`;

}

window.RCF_LOG=RCF_log;

</script>

<!-- CORE -->

<script src="/app/js/core/stability_guard.js"></script>
<script src="/app/js/core/github_sync.js"></script>
<script src="/app/js/core/vfs_overrides.js"></script>
<script src="/app/js/core/mother_selfupdate.js"></script>
<script src="/app/js/core/errors.js"></script>
<script src="/app/js/core/ui_safety.js"></script>
<script src="/app/js/core/ui_compact_outputs.js"></script>
<script src="/app/js/core/ui_bindings.js"></script>
<script src="/app/js/core/diagnostics.js"></script>

<!-- FEATURES -->

<script src="/app/js/builder.js"></script>
<script src="/app/js/pages_links.js"></script>

<script src="/app/js/admin.github.js"></script>

<script src="/app/js/zip_vault.js"></script>
<script src="/app/js/core/agent_zip_bridge.js"></script>

<!-- DOCTOR -->

<script src="/app/js/doctor_scan.js"></script>

<!-- ADMIN AI -->

<script src="/app/js/admin.admin_ai.js"></script>

</body>
</html>

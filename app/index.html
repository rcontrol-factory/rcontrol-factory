<!doctype html>
<html lang="pt-BR">
<head>
  <!-- Core -->
  <meta charset="utf-8" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />

  <title>RControl Factory</title>
  <meta name="theme-color" content="#cfd4de" />
  <meta name="color-scheme" content="light dark" />

  <!-- RCF marker -->
  <meta name="rcf-index" content="NORMAL_BOOT_2026_02_24_vCLEAN_2_RESTORED_SAFE_VISUAL_ASSETS" />

  <!-- PWA -->
  <base href="./" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./assets/rcf-logo-mark.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.svg" />

  <!-- Styles -->
  <link rel="stylesheet" href="./styles.css" />

  <!-- Fallback visual mínimo e estável (não é SafeBoot; é só splash neutro/leve) -->
  <style>
    :root{
      --rcf-bg: #d9dde6;
      --rcf-bg-2: #c8ced9;
      --rcf-ink: #1f2a44;
      --rcf-muted: #55627f;
      --rcf-line: rgba(34,52,84,.14);
      --rcf-card: rgba(255,255,255,.52);
      --rcf-blue: #4a8dff;
      --rcf-orange: #ff9b3d;
      --rcf-shadow: 0 14px 34px rgba(34,52,84,.10);
    }

    html, body {
      height: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at 18% 16%, rgba(255,255,255,.68), rgba(255,255,255,0) 26%),
        radial-gradient(circle at 82% 84%, rgba(74,141,255,.10), rgba(74,141,255,0) 22%),
        linear-gradient(180deg, var(--rcf-bg), var(--rcf-bg-2));
    }

    body {
      margin: 0;
      color: var(--rcf-ink);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    #app {
      min-height: 100%;
      position: relative;
      background: transparent;
    }

    #app::before,
    #app::after {
      content: "";
      position: fixed;
      inset: auto;
      pointer-events: none;
      z-index: 0;
      border-radius: 999px;
      opacity: .12;
    }

    #app::before {
      width: min(72vw, 520px);
      height: min(72vw, 520px);
      right: -10vw;
      top: 6vh;
      border: 26px solid rgba(91,110,145,.08);
      box-shadow:
        inset 0 0 0 18px rgba(255,255,255,.08),
        0 0 0 1px rgba(255,255,255,.16);
      transform: rotate(-10deg);
    }

    #app::after {
      width: min(48vw, 320px);
      height: min(48vw, 320px);
      left: -8vw;
      bottom: -6vh;
      border: 18px solid rgba(91,110,145,.06);
      box-shadow: inset 0 0 0 12px rgba(255,255,255,.06);
      transform: rotate(12deg);
    }

    .rcf_splash {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom)) 18px;
      box-sizing: border-box;
      position: relative;
      z-index: 1;
    }

    .rcf_splash_card {
      position: relative;
      max-width: 760px;
      width: 100%;
      box-sizing: border-box;
      padding: 18px 16px;
      border-radius: 22px;
      border: 1px solid var(--rcf-line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,.46));
      box-shadow: var(--rcf-shadow);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      overflow: hidden;
    }

    .rcf_splash_card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, rgba(74,141,255,.10), rgba(74,141,255,0) 20%, rgba(255,155,61,.10) 80%, rgba(255,155,61,0));
      opacity: .9;
    }

    .rcf_splash_head {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      z-index: 1;
    }

    .rcf_mark {
      width: 48px;
      height: 48px;
      flex: 0 0 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 35% 35%, #31415f, #182236 68%),
        linear-gradient(135deg, var(--rcf-blue), var(--rcf-orange));
      box-shadow:
        0 0 0 3px rgba(255,255,255,.58),
        0 8px 18px rgba(34,52,84,.18);
    }

    .rcf_mark::before {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 5px solid rgba(76,97,133,.46);
      clip-path: polygon(8% 34%,18% 26%,30% 8%,44% 4%,56% 4%,70% 8%,82% 26%,92% 34%,96% 46%,96% 56%,92% 68%,82% 78%,70% 92%,56% 96%,44% 96%,30% 92%,18% 78%,8% 68%,4% 56%,4% 46%);
      pointer-events: none;
    }

    .rcf_mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
    }

    .rcf_mark_fallback {
      position: absolute;
      inset: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 900;
      font-size: 12px;
      letter-spacing: .3px;
      z-index: 0;
    }

    .rcf_brand {
      min-width: 0;
    }

    .rcf_splash_title {
      margin: 0;
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: .3px;
      color: #1f2a44;
    }

    .rcf_splash_subtitle {
      margin: 2px 0 0 0;
      font-size: 12px;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      color: var(--rcf-muted);
      opacity: .95;
    }

    .rcf_splash_hint {
      position: relative;
      z-index: 1;
      margin: 10px 0 0 0;
      color: #33415f;
      opacity: .94;
      font-size: 14px;
      line-height: 1.45;
    }

    .rcf_splash_row {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .rcf_chip {
      min-height: 54px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid rgba(34,52,84,.10);
      background: rgba(255,255,255,.42);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.45);
    }

    .rcf_chip strong {
      display: block;
      font-size: 13px;
      line-height: 1.15;
      color: #23314f;
    }

    .rcf_chip span {
      display: block;
      margin-top: 3px;
      font-size: 12px;
      color: #5d6882;
    }

    @media (max-width: 720px) {
      .rcf_splash_card {
        padding: 16px 14px;
        border-radius: 18px;
      }

      .rcf_splash_row {
        grid-template-columns: 1fr;
      }

      .rcf_mark {
        width: 42px;
        height: 42px;
        flex-basis: 42px;
      }

      .rcf_mark_fallback {
        font-size: 11px;
      }

      .rcf_splash_hint {
        font-size: 13px;
      }
    }
  </style>

</head>

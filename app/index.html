<!--
  RControl Factory — INDEX (NORMAL BOOT) vCLEAN-2 PADRÃO RESTAURADO + VISUAL SAFE
  ✅ Mantém boot normal estável
  ✅ Mantém ordem original dos scripts
  ✅ Mantém admin.admin_ai.js
  ✅ Mantém doctor_scan.js
  ✅ Mantém root #app simples e estável
  ✅ Sem SAFE BOOT embutido
  ✅ Sem loader manual
  ✅ Sem listeners globais extras

  PATCH MÍNIMO VISUAL:
  - token CSS para diagnostics
  - meta iOS/PWA seguros
  - splash visual mais profissional
  - fundo refinado
  - sem alterar arquitetura do boot
-->

<!doctype html>
<html lang="pt-BR">
<head>
  <!-- Core -->
  <meta charset="utf-8" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />

  <title>RControl Factory</title>
  <meta name="theme-color" content="#0b1020" />
  <meta name="color-scheme" content="dark light" />

  <!-- iOS / PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RControl Factory" />

  <!-- RCF marker -->
  <meta name="rcf-index" content="NORMAL_BOOT_2026_02_24_vCLEAN_2_PADRAO_RESTAURADO_VISUAL_SAFE" />

  <!-- PWA -->
  <base href="./" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <!-- Styles -->
  <link rel="stylesheet" href="./styles.css" />

  <!--
    Fallback visual mínimo e elegante
    - não é SafeBoot
    - não controla fluxo
    - só entrega uma apresentação mais profissional enquanto app.js monta
  -->
  <style>
    :root{
      --rcf-css-token: "RCF_INDEX_VCLEAN2_VISUAL_SAFE";
      --bg: #0b1020;
      --bg-2: #0f172a;
      --panel: rgba(255,255,255,.06);
      --line: rgba(255,255,255,.12);
      --line-soft: rgba(255,255,255,.08);
      --text: #eaf0ff;
      --muted: #a8b3cf;
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --shadow: 0 18px 50px rgba(0,0,0,.32);
      --radius: 18px;
    }

    html, body {
      min-height: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(56,189,248,.10), transparent 30%),
        linear-gradient(180deg, #08101d 0%, #0b1020 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      overflow-x: hidden;
    }

    #app {
      min-height: 100vh;
      width: 100%;
    }

    .rcf_splash {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .rcf_splash_card {
      position: relative;
      max-width: 760px;
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 16px;
      box-sizing: border-box;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .rcf_splash_card::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, rgba(56,189,248,.0), rgba(56,189,248,.45), rgba(34,197,94,.25), rgba(56,189,248,0));
      pointer-events: none;
    }

    .rcf_brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      min-width: 0;
    }

    .rcf_brand_dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent-2), #10b981);
      box-shadow: 0 0 0 4px rgba(34,197,94,.12);
      flex: 0 0 auto;
    }

    .rcf_brand_text {
      min-width: 0;
    }

    .rcf_splash_title {
      font-size: 18px;
      font-weight: 900;
      margin: 0;
      letter-spacing: .2px;
      line-height: 1.15;
    }

    .rcf_splash_subtitle {
      margin: 2px 0 0 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.2;
    }

    .rcf_splash_hint {
      opacity: .92;
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
      margin: 12px 0 0 0;
    }

    .rcf_splash_hint strong {
      color: #ffffff;
      font-weight: 800;
    }

    .rcf_splash_meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .rcf_chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line-soft);
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      box-sizing: border-box;
    }

    .rcf_chip_ok {
      color: #d8ffe8;
      border-color: rgba(34,197,94,.20);
      background: rgba(34,197,94,.08);
    }

    .rcf_chip_info {
      color: #dbeafe;
      border-color: rgba(56,189,248,.22);
      background: rgba(56,189,248,.08);
    }

    @media (max-width: 640px) {
      .rcf_splash {
        padding: 16px;
      }

      .rcf_splash_card {
        padding: 16px 14px;
        border-radius: 16px;
      }

      .rcf_splash_title {
        font-size: 17px;
      }

      .rcf_splash_hint {
        font-size: 12.5px;
      }

      .rcf_chip {
        font-size: 11.5px;
        padding: 7px 11px;
      }
    }
  </style>

  <!--
    BOOT PADRÃO (scripts estáticos com defer)
    IMPORTANTE: não mudar ordem sem necessidade.
  -->

  <!-- Core / boot safety -->
  <script defer src="./js/core/logger.js"></script>
  <script defer src="./js/core/stability_guard.js"></script>
  <script defer src="./js/core/factory_state.js"></script>
  <script defer src="./js/core/module_registry.js"></script>
  <script defer src="./js/core/context_engine.js"></script>
  <script defer src="./js/core/factory_tree.js"></script>

  <!-- Storage + GitHub + VFS + MAE + updates -->
  <script defer src="./js/core/storage.js"></script>
  <script defer src="./js/core/github_sync.js"></script>
  <script defer src="./js/core/vfs_overrides.js"></script>
  <script defer src="./js/core/vfs_shim.js"></script>
  <script defer src="./js/core/mother_selfupdate.js"></script>

  <!-- Errors + UI safety/compact -->
  <script defer src="./js/core/errors.js"></script>
  <script defer src="./js/core/ui_safety.js"></script>
  <script defer src="./js/core/ui_compact_outputs.js"></script>

  <!-- UI bindings + diagnostics + doctor + preview -->
  <script defer src="./js/core/ui_bindings.js"></script>
  <script defer src="./js/core/diagnostics.js"></script>
  <script defer src="./js/core/doctor_scan.js"></script>
  <script defer src="./js/core/preview_runner.js"></script>

  <!-- Injector + engine pipeline -->
  <script defer src="./js/core/injector.js"></script>
  <script defer src="./js/engine/template_registry.js"></script>
  <script defer src="./js/engine/module_registry.js"></script>
  <script defer src="./js/engine/builder.js"></script>
  <script defer src="./js/engine/engine.js"></script>

  <!-- Pages links + Admin GH + Admin AI -->
  <script defer src="./js/core/pages_links.js"></script>
  <script defer src="./js/admin.github.js"></script>
  <script defer src="./js/admin.admin_ai.js"></script>

  <!-- App main -->
  <script defer src="./app.js"></script>

  <!-- Vault / ZIP -->
  <script defer src="./js/core/zip_vault.js"></script>
  <script defer src="./js/core/agent_zip_bridge.js"></script>
</head>

<body>
  <noscript>Ative o JavaScript para usar a RControl Factory.</noscript>

  <!-- Root único e fixo -->
  <div id="app">
    <!-- Splash neutro/bonito; o app substitui ao montar -->
    <div class="rcf_splash" aria-label="RCF carregando">
      <div class="rcf_splash_card">
        <div class="rcf_brand">
          <div class="rcf_brand_dot"></div>
          <div class="rcf_brand_text">
            <h1 class="rcf_splash_title">RControl Factory</h1>
            <p class="rcf_splash_subtitle">Factory interna • PWA • Offline-first</p>
          </div>
        </div>

        <p class="rcf_splash_hint">
          <strong>Carregando módulos…</strong><br />
          Se a tela ficar presa, use o Safe Boot separado apenas como emergência.
        </p>

        <div class="rcf_splash_meta" aria-hidden="true">
          <div class="rcf_chip rcf_chip_ok">Boot normal</div>
          <div class="rcf_chip rcf_chip_info">Doctor ativo</div>
          <div class="rcf_chip">Admin AI mantido</div>
        </div>
      </div>
    </div>
  </div>

  <!--
    Sem SAFE BOOT aqui.
    Sem loader JS aqui.
    Sem timers aqui.
    Sem listeners globais aqui.
  -->
</body>
</html>

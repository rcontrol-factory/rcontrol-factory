<!-- FILE: app/index.html -->
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"
  />
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RCF" />

  <title>RControl Factory</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <style>
    :root{
      --bg:#0b1220;
      --panel:#121a2b;
      --panel-2:#0f1727;
      --line:rgba(255,255,255,.08);
      --text:#f5f7fb;
      --muted:#9fb0cc;
      --brand:#4f8cff;
      --ok:#23c483;
      --warn:#f59e0b;
      --danger:#ef4444;
      --shadow:0 10px 30px rgba(0,0,0,.28);
      --radius:16px;
      --rcf-css-token:"RCF_INDEX_V8_BASE";
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ margin:0; padding:0; min-height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif; }
    body{
      overscroll-behavior-y:none;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    #app{
      min-height:100vh;
    }

    .boot{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:
        radial-gradient(1200px 500px at 20% -10%, rgba(79,140,255,.18), transparent 60%),
        radial-gradient(900px 400px at 100% 0%, rgba(35,196,131,.12), transparent 55%),
        var(--bg);
    }

    .boot-card{
      width:min(100%, 760px);
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:22px;
    }

    .boot-top{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }

    .boot-dot{
      width:14px;
      height:14px;
      border-radius:999px;
      background:linear-gradient(180deg, #6ea4ff, #3d74ff);
      box-shadow:0 0 0 6px rgba(79,140,255,.14);
      flex:0 0 auto;
    }

    .boot-title{
      font-size:20px;
      font-weight:800;
      letter-spacing:.2px;
    }

    .boot-sub{
      color:var(--muted);
      font-size:13px;
      margin-top:2px;
    }

    .boot-msg{
      margin-top:14px;
      padding:14px 16px;
      border-radius:14px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      color:#dbe7ff;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .boot-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .btn{
      appearance:none;
      border:0;
      border-radius:999px;
      padding:12px 16px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
    }

    .btn.primary{
      background:var(--brand);
      color:#fff;
    }

    .btn.ghost{
      background:rgba(255,255,255,.06);
      color:#fff;
      border:1px solid var(--line);
    }

    .hint{
      margin-top:12px;
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="boot" id="bootScreen">
      <div class="boot-card">
        <div class="boot-top">
          <div class="boot-dot"></div>
          <div>
            <div class="boot-title">RControl Factory</div>
            <div class="boot-sub">Inicializando ambiente seguro…</div>
          </div>
        </div>

        <div class="boot-msg" id="bootMsg">Carregando interface…</div>

        <div class="boot-actions">
          <button class="btn ghost" id="bootReloadBtn" type="button">Recarregar</button>
          <button class="btn ghost" id="bootClearBtn" type="button">Limpar cache local</button>
        </div>

        <div class="hint">
          Se travar no Safari/iPhone: limpar cache, unregister do Service Worker e recarregar.
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      function setBoot(text) {
        try {
          var el = document.getElementById("bootMsg");
          if (el) el.textContent = String(text || "");
        } catch {}
      }

      function clearLocalFactoryData() {
        try {
          var keysToDelete = [];
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (!k) continue;
            if (
              k.indexOf("rcf:") === 0 ||
              k.indexOf("RCF_") === 0 ||
              k === "__RCF_BOOT_STATE__"
            ) {
              keysToDelete.push(k);
            }
          }
          keysToDelete.forEach(function (k) {
            try { localStorage.removeItem(k); } catch {}
          });
        } catch {}
      }

      try {
        var reloadBtn = document.getElementById("bootReloadBtn");
        if (reloadBtn) {
          reloadBtn.addEventListener("click", function () {
            location.reload();
          }, { passive:true });
        }

        var clearBtn = document.getElementById("bootClearBtn");
        if (clearBtn) {
          clearBtn.addEventListener("click", async function () {
            setBoot("Limpando dados locais…");
            try { clearLocalFactoryData(); } catch {}

            try {
              if ("caches" in window) {
                var keys = await caches.keys();
                await Promise.all(keys.map(function (k) { return caches.delete(k); }));
              }
            } catch {}

            try {
              if ("serviceWorker" in navigator) {
                var regs = await navigator.serviceWorker.getRegistrations();
                for (var i = 0; i < regs.length; i++) {
                  try { await regs[i].unregister(); } catch {}
                }
              }
            } catch {}

            setBoot("Limpeza concluída. Recarregando…");
            setTimeout(function () { location.reload(); }, 500);
          });
        }
      } catch {}

      setBoot("Carregando módulos principais…");
    })();
  </script>

  <!-- CORE -->
  <script src="./js/core/diagnostics.js"></script>
  <script src="./js/core/github_sync.js"></script>
  <script src="./js/core/ui_bindings.js"></script>

  <!-- ENGINE -->
  <script src="./js/engine/errorEngine.js"></script>

  <!-- ADMIN / INTEGRAÇÕES -->
  <script src="./js/admin.github.js"></script>

  <!-- APP ROOT -->
  <script src="./app.js"></script>
</body>
</html>
